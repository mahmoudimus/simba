name: simba ci

on:
    push:
        branches:
            - "main"
    pull_request:
        types:
            - synchronize
            - opened
            - reopened
            - ready_for_review
        branches:
            - "main"

# cancel previous workflow jobs for PRs
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-24.04
        # Outer guard: bound the whole job so a hung test or a stalled runner
        # fails fast instead of running to the 6h Actions ceiling (a transient
        # pytest stall on PR #80 burned ~2h). scripts/checks.sh adds a per-test
        # --timeout for granular catching + a traceback of where it stuck.
        timeout-minutes: 20
        steps:
            - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            # Install uv via its script — NOT astral-sh/setup-uv, whose
            # post-action cleanup step failed the job (even with caching off).
            - name: Install uv
              run: |
                  curl -LsSf https://astral.sh/uv/install.sh | sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            # Prefer the prebuilt llama-cpp-python CPU wheel to skip the slow
            # source build (falls back to building if no matching wheel exists).
            - name: Install dependencies
              env:
                  UV_EXTRA_INDEX_URL: https://abetlen.github.io/llama-cpp-python/whl/cpu
              run: uv sync --python 3.13

            # Both steps below call scripts/checks.sh — the SAME script the git
            # hooks run (.githooks/pre-commit, pre-push) — so CI and local can't
            # drift. Kept as two steps for readable per-check status in the UI.
            - name: Lint (ruff)
              run: ./scripts/checks.sh lint

            - name: Tests (pytest)
              run: ./scripts/checks.sh test
